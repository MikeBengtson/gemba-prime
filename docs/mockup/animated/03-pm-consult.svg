<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1200" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <title>Animated: PM panel opens from collapsed; user types "What remains?"; PM response streams in. 5s loop.</title>
  <defs>
    <style>
      .txt { fill: #2B2B2B; }
      .muted { fill: #6B6B6B; }
      .mono { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; }

      /* Panel expand/collapse */
      @keyframes panelopen {
        0%,6%    { transform: translateY(272px); }
        14%      { transform: translateY(0); }
        92%      { transform: translateY(0); }
        100%     { transform: translateY(272px); }
      }
      @keyframes cursorpm {
        0%,6%    { transform: translate(1850px, 1150px); opacity: 1; }
        11%      { transform: translate(1850px, 1150px) scale(0.9); opacity: 1; }
        14%,25%  { transform: translate(1850px, 1150px) scale(1); opacity: 0.5; }
        30%,100% { opacity: 0; }
      }
      @keyframes collapsedhide {
        0%,5%    { opacity: 1; }
        12%,100% { opacity: 0; }
      }
      @keyframes openshow {
        0%,8%    { opacity: 0; }
        14%,100% { opacity: 1; }
      }

      /* Typed prompt: letters appear stagger */
      @keyframes typedin {
        0%,20%   { width: 0; }
        40%      { width: 280px; }
        70%      { width: 280px; }
        75%,100% { width: 0; }
      }
      @keyframes cursortext {
        0%,20%   { opacity: 0; }
        25%,35%  { opacity: 1; }
        40%,70%  { opacity: 1; }
        72%,100% { opacity: 0; }
      }
      @keyframes spinshow {
        0%,42%   { opacity: 0; }
        44%,50%  { opacity: 1; }
        52%,100% { opacity: 0; }
      }
      @keyframes spinrot {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }

      /* PM reply streams in */
      @keyframes replystream {
        0%,50%   { width: 0; }
        66%      { width: 780px; }
        70%,100% { width: 780px; }
      }
      @keyframes replyshow {
        0%,50%   { opacity: 0; }
        55%,100% { opacity: 1; }
      }
      @keyframes costupdate {
        0%,55%   { opacity: 1; }
        56%,100% { opacity: 0; }
      }
      @keyframes costupdatenew {
        0%,55%   { opacity: 0; }
        56%,100% { opacity: 1; }
      }

      .panel      { animation: panelopen 5s ease-in-out infinite; }
      .cursor     { animation: cursorpm 5s ease-in-out infinite; }
      .collapsed  { animation: collapsedhide 5s ease-in-out infinite; }
      .opened     { animation: openshow 5s ease-in-out infinite; }
      .typed      { animation: typedin 5s ease-in-out infinite; }
      .typedcursor { animation: cursortext 5s ease-in-out infinite; }
      .spin       { animation: spinshow 5s ease-in-out infinite; transform-origin: center; }
      .spindot    { animation: spinrot 1s linear infinite; transform-origin: center; }
      .reply      { animation: replyshow 5s ease-in-out infinite; }
      .replymask  { animation: replystream 5s steps(1) infinite; }
      .cost-old   { animation: costupdate 5s steps(1) infinite; }
      .cost-new   { animation: costupdatenew 5s steps(1) infinite; }

      @media (prefers-reduced-motion: reduce) {
        .panel, .cursor, .collapsed, .opened, .typed, .typedcursor,
        .spin, .spindot, .reply, .replymask, .cost-old, .cost-new { animation: none; }
        .panel { transform: translateY(0); }
        .collapsed { opacity: 0; }
        .opened, .reply { opacity: 1; }
        .cost-old { opacity: 0; }
        .cost-new { opacity: 1; }
      }
    </style>

    <clipPath id="typed-clip">
      <rect x="0" y="0" width="280" height="30" class="typed"/>
    </clipPath>
    <clipPath id="reply-clip">
      <rect x="0" y="0" width="780" height="30" class="replymask"/>
    </clipPath>
  </defs>

  <!-- Background: board slice, dimmed -->
  <rect width="1920" height="1200" fill="#FAFAF7"/>

  <!-- Top bar -->
  <rect x="0" y="0" width="1920" height="56" fill="#FFFFFF"/>
  <line x1="0" y1="56" x2="1920" y2="56" stroke="#E5E0D5" stroke-width="1"/>
  <g transform="translate(60,16)">
    <rect width="140" height="24" rx="6" fill="#F5EFE0" stroke="#E5E0D5"/>
    <text x="12" y="17" class="txt" font-size="13" font-weight="600">marker</text>
  </g>
  <g transform="translate(212,16)">
    <rect width="96" height="24" rx="12" fill="#EAF2FB" stroke="#3B82C9"/>
    <circle cx="12" cy="12" r="4" fill="#3B82C9"/>
    <text x="22" y="16" fill="#2A4460" font-size="12" font-weight="600">supervised</text>
  </g>
  <!-- PM panel toggle in top bar -->
  <g transform="translate(1820,16)">
    <rect width="90" height="24" rx="12" fill="#F5EFE0" stroke="#E5E0D5"/>
    <circle cx="12" cy="12" r="5" fill="#EDE6F5"/>
    <text x="22" y="16" font-size="12" class="txt" font-weight="600">PM panel</text>
  </g>

  <!-- Sidebar rail -->
  <rect x="0" y="56" width="64" height="1144" fill="#FFFFFF"/>
  <line x1="64" y1="56" x2="64" y2="1200" stroke="#E5E0D5"/>

  <!-- Board column slice, faded -->
  <g opacity="0.35">
    <text x="140"  y="120" font-size="14" font-weight="700" class="txt">Backlog</text>
    <text x="440"  y="120" font-size="14" font-weight="700" class="txt">Next Up</text>
    <text x="780"  y="120" font-size="14" font-weight="700" class="txt">Staged</text>
    <text x="1100" y="120" font-size="14" font-weight="700" class="txt">In Progress</text>
    <text x="1420" y="120" font-size="14" font-weight="700" class="txt">Done</text>
    <rect x="100" y="140" width="280" height="780" fill="#FFFFFF" stroke="#E5E0D5" rx="6"/>
    <rect x="400" y="140" width="320" height="780" fill="#FFFFFF" stroke="#E5E0D5" rx="6"/>
    <rect x="740" y="140" width="320" height="780" fill="#FFFFFF" stroke="#E5E0D5" rx="6"/>
    <rect x="1080" y="140" width="300" height="780" fill="#FFFFFF" stroke="#E5E0D5" rx="6"/>
    <rect x="1400" y="140" width="280" height="780" fill="#FFFFFF" stroke="#E5E0D5" rx="6"/>

    <!-- A couple of cards just as texture -->
    <g transform="translate(120,170)">
      <rect width="240" height="82" rx="10" fill="#FAFAF7" stroke="#E5E0D5"/>
      <rect x="0" y="0" width="3" height="82" rx="2" fill="#C94A4A"/>
      <text x="18" y="26" font-size="12" class="mono muted">mk-e6</text>
    </g>
    <g transform="translate(1100,170)">
      <rect width="260" height="96" rx="10" fill="#FAFAF7" stroke="#E5E0D5"/>
      <rect x="0" y="0" width="3" height="96" rx="2" fill="#C94A4A"/>
      <text x="18" y="26" font-size="12" class="mono muted">mk-e2</text>
    </g>
  </g>

  <!-- Dimming overlay for the board area, to draw attention to the PM panel -->
  <rect x="64" y="56" width="1856" height="1088" fill="#FAFAF7" opacity="0.25"/>

  <!-- ==================== COLLAPSED STATE ==================== -->
  <g class="collapsed">
    <rect x="64" y="1144" width="1856" height="56" fill="#FFFFFF" stroke="#E5E0D5"/>
    <g transform="translate(94, 1162)">
      <circle cx="10" cy="10" r="10" fill="#EDE6F5"/>
      <text x="10" y="15" font-size="12" text-anchor="middle">📋</text>
      <rect x="32" y="2" width="420" height="20" rx="10" fill="#FAFAF7" stroke="#E5E0D5"/>
      <text x="44" y="16" font-size="12" class="muted">Ask a Coach or consult a Manager…</text>
      <text x="1780" y="14" font-size="12" class="muted mono" text-anchor="end">⌘P</text>
    </g>
  </g>

  <!-- ==================== EXPANDED PANEL ==================== -->
  <g class="panel">
    <g class="opened">
      <!-- Expanded PM panel at bottom (320px tall, starting at y=880) -->
      <rect x="64" y="880" width="1856" height="320" fill="#FFFFFF" stroke="#E5E0D5"/>
      <line x1="64" y1="880" x2="1920" y2="880" stroke="#E5E0D5"/>

      <!-- Header -->
      <g transform="translate(90, 902)">
        <circle cx="14" cy="14" r="14" fill="#EDE6F5"/>
        <text x="14" y="19" font-size="16" text-anchor="middle">📋</text>
        <text x="36" y="14" font-size="13" font-weight="700" class="txt">Project Manager</text>
        <text x="36" y="32" font-size="11" class="muted mono">Manager · opus 4.7 · consulting</text>

        <!-- Cost in header: old + new -->
        <text x="1780" y="10" font-size="11" class="muted mono" text-anchor="end" class="cost-old">$0.00 this session</text>
        <text x="1780" y="10" font-size="11" class="muted mono" text-anchor="end" class="cost-new">$0.004 · 1 turn</text>
        <text x="1780" y="28" font-size="10" class="muted mono" text-anchor="end">⌘P to collapse</text>
      </g>

      <!-- Quick actions row -->
      <g transform="translate(90, 950)">
        <rect width="158" height="28" rx="14" fill="#F5EFE0" stroke="#E5E0D5"/>
        <text x="79" y="18" font-size="12" font-weight="600" fill="#2A4460" text-anchor="middle">Recommend order</text>

        <g transform="translate(170,0)">
          <rect width="140" height="28" rx="14" fill="#3B5B7A"/>
          <text x="70" y="18" font-size="12" font-weight="600" fill="#FFFFFF" text-anchor="middle">What remains</text>
        </g>

        <g transform="translate(330,0)">
          <rect width="128" height="28" rx="14" fill="#F5EFE0" stroke="#E5E0D5"/>
          <text x="64" y="18" font-size="12" font-weight="600" fill="#2A4460" text-anchor="middle">Trim to budget</text>
        </g>
      </g>

      <!-- User turn: typed prompt -->
      <g transform="translate(90, 996)">
        <text x="0" y="12" font-size="11" class="muted">You</text>
        <rect x="0" y="20" width="700" height="38" rx="8" fill="#FAFAF7" stroke="#E5E0D5"/>
        <!-- clipped text -->
        <g clip-path="url(#typed-clip)" transform="translate(14, 0)">
          <text y="44" font-size="13" class="txt" font-family="'Inter', sans-serif">What remains on the board right now?</text>
        </g>
        <!-- blinking cursor caret -->
        <rect x="294" y="28" width="2" height="22" fill="#3B5B7A" class="typedcursor"/>
        <!-- Send icon / enter hint -->
        <g transform="translate(714, 28)">
          <rect width="28" height="22" rx="6" fill="#3B5B7A"/>
          <text x="14" y="16" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">⏎</text>
        </g>
      </g>

      <!-- Loading spinner when the user pressed enter -->
      <g transform="translate(808, 1020)" class="spin">
        <g class="spindot">
          <circle cx="0" cy="0" r="10" fill="none" stroke="#3B5B7A" stroke-width="2" stroke-dasharray="12 18"/>
        </g>
      </g>

      <!-- PM reply streaming -->
      <g transform="translate(90, 1072)" class="reply">
        <text x="0" y="12" font-size="11" class="muted">PM</text>
        <g clip-path="url(#reply-clip)">
          <text x="0" y="36" font-size="13" class="txt" font-family="'Inter', sans-serif">105 open beads across 8 Epics. Marker is in the building phase…</text>
        </g>
      </g>
    </g>
  </g>

  <!-- Cursor -->
  <g class="cursor">
    <path d="M0 0 L0 18 L5 14 L8 20 L10 19 L7 13 L13 13 Z"
          fill="#2B2B2B" stroke="#FFFFFF" stroke-width="1"/>
  </g>

  <!-- Caption -->
  <g transform="translate(100, 100)">
    <text font-size="11" class="mono muted">// PM panel opens · user types · response streams · 5s loop</text>
  </g>
</svg>
