      <text y="16" font-size="11" font-weight="700" letter-spacing="0.8" fill="#2A4460">BUDGET POLICY</text>
      <text y="42" font-size="13" class="txt">$0.25/invocation cap · $20/day cap · separate from sprint budget</text>
    </g>

    <!-- Edit + TOML buttons -->
    <g transform="translate(40, 620)">
      <rect width="140" height="44" rx="10" fill="#3B5B7A"/>
      <text x="70" y="28" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">Edit</text>
      <g transform="translate(160, 0)">
        <rect width="200" height="44" rx="10" fill="#FFFFFF" stroke="#E5E0D5"/>
        <text x="100" y="28" font-size="14" font-weight="600" fill="#2A4460" text-anchor="middle">Open TOML…</text>
