    <path d="M0 0 L0 18 L5 14 L8 20 L10 19 L7 13 L13 13 Z"
          fill="#2B2B2B" stroke="#FFFFFF" stroke-width="1"/>
  </g>

  <!-- Caption -->
  <g transform="translate(120, 1160)">
    <text font-size="12" class="mono muted">// Click PM card → expand PPPP config (personality, perspective, purview) · 4s loop</text>
  </g>
</svg>
