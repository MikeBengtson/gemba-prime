name = "gm-m4-graph"
version = 1
description = "Interactive dependency graph with React Flow"

[meta]
rig = "gemba"
owner_epic = "gm-e6"
tier = "opus"

[execution]
timeout = "6h"
notify_on_failure = true
severity = "MEDIUM"

[[steps]]
ref = "data-shape"
title = "Graph data endpoint: nodes + typed edges"
description = """
## Step: data-shape
Define `GET /api/graph?rig=...&epic=...&depth=...` returning nodes
and edges in the shape React Flow expects. Edge.type encodes the
Beads dep type (blocks, related, parent-child, discovered-from,
waits-for, replies-to, conditional-blocks).

Server-side pagination not feasible (graphs are relational). Instead
cap depth + node count; if exceeded, return a sampled subgraph with
a flag `truncated: true` so the UI can warn.
"""
tier = "sonnet"

[[steps]]
ref = "layout-engine"
title = "Layout: dagre for hierarchy, d3-force for relational"
description = """
## Step: layout-engine
Needs: data-shape

Strategy: if parent-child + blocks dominate edges -> dagre layered
layout (top-down). Otherwise d3-force. User can override via a
toggle. Fit-to-viewport button recenters.
"""
tier = "opus"

[[steps]]
ref = "node-styling"
title = "Custom node renderers per issue_type"
description = """
## Step: node-styling
Needs: data-shape

Render nodes with shape-by-type (epic rounded rect, task rect, bug
diamond, story tag, feature hex, message speech bubble). Status color
on the border. Assignee avatar in corner when present. Hover shows
compact tooltip with title and priority.
"""
tier = "sonnet"

[[steps]]
ref = "edge-styling"
title = "Custom edge renderers per dep type"
description = """
## Step: edge-styling
Needs: data-shape

Colors per README taxonomy. Arrow semantics: blocks edge arrow points
from blocker to blocked. Conditional-blocks rendered as dashed. Edge
hover shows label.
"""
tier = "sonnet"

[[steps]]
ref = "cycle-critical-path"
title = "Cycle detection + critical path highlight"
description = """
## Step: cycle-critical-path
Needs: layout-engine, node-styling, edge-styling

Cycle detection runs client-side using Tarjan's SCC on the blocks
subgraph; any non-singleton SCC is highlighted in orange. Critical
path mode finds longest chain of blocks edges and highlights it.
"""
tier = "opus"

[[steps]]
ref = "perf-budget"
title = "Performance tuning for 1k+ node graphs"
description = """
## Step: perf-budget
Needs: layout-engine, node-styling, edge-styling

Target: 60fps pan/zoom on 1k nodes, interactive on 5k. Techniques:
memoize node/edge renderers, virtualize the rendered subset based on
viewport, lazy-expand deep subtrees on node click instead of rendering
everything up front.
"""
tier = "opus"
