name = "gm-m3-board"
version = 1
description = "Kanban board feature: reusable board component, convoy board, backlog board"

[meta]
rig = "gemba"
owner_epic = "gm-e5"
tier = "sonnet"

[execution]
timeout = "8h"
notify_on_failure = true
severity = "HIGH"

[[steps]]
ref = "board-component"
title = "Generic @dnd-kit board component with a11y"
description = """
## Step: board-component
Reference gm-e5.1.

Keyboard a11y is non-negotiable: space to grab, arrows to move,
space to drop, escape to cancel. Screen reader announcements use
dnd-kit's Announcements API. Test with VoiceOver and NVDA before
closing.
"""
tier = "opus"

[[steps]]
ref = "convoy-board"
title = "Convoy board route"
description = """
## Step: convoy-board
Needs: board-component
Reference gm-e5.2.

Close-convoy safety: first close attempt uses the non-force path. If
beads are open, surface the count and require explicit confirmation
for the force path. Mirror the safety semantics of `gt convoy close
--force`.
"""
tier = "sonnet"

[[steps]]
ref = "backlog-board"
title = "Cross-rig backlog board with sling action"
description = """
## Step: backlog-board
Needs: board-component
Reference gm-e5.3.
"""
tier = "sonnet"

[[steps]]
ref = "confirm-integration"
title = "Wire all board mutations through confirm middleware"
description = """
## Step: confirm-integration
Needs: convoy-board, backlog-board

Every drag, every bulk action, every sling must acquire a confirm
nonce unless the server is in --dangerously-skip-permissions mode.
Test the mismatched-payload case explicitly: a replay attempt with
a different payload must fail.
"""
tier = "opus"
