name = "gm-m1-foundation"
version = 1
description = "Gemba Phase 1 scaffold: repo structure, Go module, Vite frontend, embed pipeline, CI"

[meta]
rig = "gemba"
owner_epic = "gm-e1"
tier = "sonnet"

[execution]
timeout = "2h"
notify_on_failure = true
severity = "HIGH"

# ---------------------------------------------------------------------
# Steps. Each step materializes as a child bead of the poured molecule,
# linked by parent-child. Needs: lines encode blocks edges between steps.
# ---------------------------------------------------------------------

[[steps]]
ref = "module-init"
title = "Initialize Go module and directory layout"
description = """
## Step: module-init
Create the repo structure matching gm-e1.1. Reference that bead for the
full specification.

After:
- `go build ./...` succeeds
- `go vet ./...` clean
"""
tier = "haiku"

[[steps]]
ref = "cobra-cli"
title = "Scaffold Cobra CLI with serve, doctor, version"
description = """
## Step: cobra-cli
Needs: module-init
Reference gm-e1.2 for the flag surface and behavior specification.
"""
tier = "haiku"

[[steps]]
ref = "embed-pipeline"
title = "Wire go:embed and SPA fallback routing"
description = """
## Step: embed-pipeline
Needs: cobra-cli
Reference gm-e1.3. Set up //go:embed and the static file handler with
SPA fallback behavior. Be careful not to shadow /api/* (see gm-b2).
"""
tier = "sonnet"

[[steps]]
ref = "frontend-scaffold"
title = "Vite + React + TS + Tailwind + shadcn/ui scaffold"
description = """
## Step: frontend-scaffold
Needs: module-init
Reference gm-e1.4 for the package list and configuration.
"""
tier = "sonnet"

[[steps]]
ref = "makefile"
title = "Author Makefile with dev/build/test/lint/release targets"
description = """
## Step: makefile
Needs: embed-pipeline, frontend-scaffold
Reference gm-e1.5.
"""
tier = "haiku"

[[steps]]
ref = "ci"
title = "GitHub Actions CI for lint, test, build matrix"
description = """
## Step: ci
Needs: makefile
Reference gm-e1.6.
"""
tier = "haiku"

[[steps]]
ref = "verify-phase-exit"
title = "Verify Phase 1 exit criteria"
description = """
## Step: verify-phase-exit
Needs: ci

Run the full verify checklist from gm-e1:
- `go install github.com/.../gemba/cmd/gemba@latest` works
- `gemba serve` binds :7666, serves embedded SPA, closes cleanly
- `make dev` runs Vite + Go with proxy
- `make build` produces a single-binary with SPA embedded
- CI green on main

If any check fails, escalate to Witness with severity HIGH rather
than attempting open-ended fixes.
"""
tier = "sonnet"
