<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1200" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <title>Animated: drag mk-e4 "Browser extension" card from Next Up into Staged. Loops every 4s.</title>
  <desc>Cursor grabs mk-e4, lifts it, moves right into Staged column. Column tints navy as a valid drop zone, card bounces into place, column counts update (Next Up 2→1, Staged 1→2), hold briefly, then reset.</desc>

  <defs>
    <style>
      .txt { fill: #2B2B2B; }
      .muted { fill: #6B6B6B; }
      .mono { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', 'Consolas', monospace; }
      .card { fill: #FFFFFF; stroke: #E5E0D5; }
      .card-shadow { fill: rgba(42,68,96,0.06); }

      /* ===== A1 loop: 4s ===== */
      /* Dragged card travels from Next Up (x=378) -> over Staged (x=684) */
      #drag-card {
        animation: drag-path 4s infinite;
        transform-origin: center;
      }
      @keyframes drag-path {
        0%,   10% { transform: translate(378px, 196px) scale(1); filter: drop-shadow(0 1px 2px rgba(42,68,96,0.08)); }
        12%       { transform: translate(378px, 192px) scale(1.02); filter: drop-shadow(0 6px 12px rgba(42,68,96,0.18)); }
        25%       { transform: translate(532px, 208px) scale(1.02); filter: drop-shadow(0 6px 12px rgba(42,68,96,0.18)); }
        50%       { transform: translate(684px, 228px) scale(1.02); filter: drop-shadow(0 6px 12px rgba(42,68,96,0.18)); }
        62%       { transform: translate(684px, 244px) scale(1.0);  filter: drop-shadow(0 3px 6px rgba(42,68,96,0.10)); }
        66%       { transform: translate(684px, 238px) scale(1.0);  filter: drop-shadow(0 2px 4px rgba(42,68,96,0.08)); }
        75%, 92%  { transform: translate(684px, 244px) scale(1.0);  filter: drop-shadow(0 2px 4px rgba(42,68,96,0.08)); }
        100%      { transform: translate(378px, 196px) scale(1); filter: drop-shadow(0 1px 2px rgba(42,68,96,0.08)); }
      }

      /* Ghost outline at origin: shows while card in flight */
      #ghost-origin {
        opacity: 0;
        animation: ghost-fade 4s infinite;
      }
      @keyframes ghost-fade {
        0%, 10%, 92%, 100% { opacity: 0; }
        14%, 75%           { opacity: 1; }
      }

      /* Cursor: travels with the card (anchored to top-left of card) */
      #cursor {
        animation: cursor-path 4s infinite;
      }
      @keyframes cursor-path {
        0%,   8%  { transform: translate(592px, 238px); }
        12%       { transform: translate(592px, 232px); }
        25%       { transform: translate(746px, 248px); }
        50%       { transform: translate(898px, 268px); }
        62%       { transform: translate(898px, 284px); }
        75%, 92%  { transform: translate(898px, 284px); }
        100%      { transform: translate(592px, 238px); }
      }

      /* Staged column header navy-tint while card crosses boundary */
      #staged-header-tint {
        opacity: 0;
        animation: staged-tint 4s infinite;
      }
      @keyframes staged-tint {
        0%, 35%, 70%, 100% { opacity: 0; }
        40%, 65%           { opacity: 1; }
      }

      /* Column count swap: Next Up 2→1, Staged 1/3 → 2/3 */
      #nextup-count-old { animation: count-hide 4s infinite; }
      #nextup-count-new { animation: count-show 4s infinite; }
      #staged-count-old { animation: count-hide 4s infinite; }
      #staged-count-new { animation: count-show 4s infinite; }
      @keyframes count-hide {
        0%, 63%   { opacity: 1; }
        65%, 92%  { opacity: 0; }
        100%      { opacity: 1; }
      }
      @keyframes count-show {
        0%, 63%   { opacity: 0; }
        65%, 92%  { opacity: 1; }
        100%      { opacity: 0; }
      }

      @media (prefers-reduced-motion: reduce) {
        #drag-card, #ghost-origin, #cursor,
        #staged-header-tint,
        #nextup-count-old, #nextup-count-new,
        #staged-count-old, #staged-count-new {
          animation: none;
        }
        #drag-card { transform: translate(684px, 244px); }
        #ghost-origin { opacity: 0; }
        #cursor { transform: translate(898px, 284px); }
        #staged-header-tint { opacity: 0; }
        #nextup-count-old { opacity: 0; }
        #nextup-count-new { opacity: 1; }
        #staged-count-old { opacity: 0; }
        #staged-count-new { opacity: 1; }
      }
    </style>

    <!-- Reusable card glyphs -->
    <g id="card-e4">
      <rect width="300" height="120" rx="12" class="card-shadow" transform="translate(1,2)"/>
      <rect width="300" height="120" rx="12" class="card"/>
      <rect x="0" y="0" width="4" height="120" rx="2" fill="#C87947"/>
      <text x="18" y="24" class="txt mono" font-size="11" font-weight="600" fill="#6B6B6B">mk-e4 · P1</text>
      <text x="18" y="52" class="txt" font-size="14" font-weight="600">Browser extension</text>
      <text x="18" y="76" class="muted" font-size="11">3/5 ready · 2 blocked</text>
      <text x="18" y="100" fill="#C84747" font-size="10" font-weight="600">blocks-on-done cleared</text>
    </g>

    <g id="card-e3-staged">
      <rect width="300" height="140" rx="12" class="card-shadow" transform="translate(1,2)"/>
      <rect width="300" height="140" rx="12" class="card"/>
      <rect x="0" y="0" width="4" height="140" rx="2" fill="#C87947"/>
      <text x="18" y="24" class="txt mono" font-size="11" font-weight="600" fill="#6B6B6B">mk-e3 · P1</text>
      <circle cx="252" cy="20" r="10" fill="#EAF2FB" stroke="#3B82C9"/>
      <text x="252" y="24" fill="#2A4460" font-size="11" font-weight="700" text-anchor="middle">A</text>
      <text x="18" y="52" class="txt" font-size="14" font-weight="600">CLI (marker binary)</text>
      <text x="18" y="76" class="muted" font-size="11">4/4 ready · all staged</text>
      <text x="18" y="100" class="muted" font-size="10" letter-spacing="0.5" font-weight="600">EPIC TOKEN BUDGET</text>
      <rect x="18" y="106" width="264" height="6" rx="3" fill="#E5E0D5"/>
      <rect x="18" y="106" width="66" height="6" rx="3" fill="#5A9E6F"/>
      <text x="282" y="112" class="muted" font-size="10" text-anchor="end">25% · ~60k est</text>
      <text x="18" y="130" fill="#2A4460" font-size="10" font-weight="600">files: cmd/marker/*</text>
    </g>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1200" fill="#FAFAF7"/>

  <!-- =============== TOP BAR =============== -->
  <g id="topbar">
    <rect x="0" y="0" width="1920" height="56" fill="#FFFFFF"/>
    <line x1="0" y1="56" x2="1920" y2="56" stroke="#E5E0D5" stroke-width="1"/>

    <g transform="translate(18,18)">
      <rect width="20" height="2" y="3" fill="#6B6B6B" rx="1"/>
      <rect width="20" height="2" y="9" fill="#6B6B6B" rx="1"/>
      <rect width="20" height="2" y="15" fill="#6B6B6B" rx="1"/>
    </g>

    <g transform="translate(60,16)">
      <rect width="140" height="24" rx="6" fill="#F5EFE0" stroke="#E5E0D5"/>
      <text x="12" y="17" class="txt" font-size="13" font-weight="600">marker</text>
    </g>

    <g transform="translate(212,16)">
      <rect width="96" height="24" rx="12" fill="#EAF2FB" stroke="#3B82C9"/>
      <circle cx="12" cy="12" r="4" fill="#3B82C9"/>
      <text x="22" y="16" fill="#2A4460" font-size="12" font-weight="600">supervised</text>
    </g>

    <g transform="translate(316,16)">
      <rect width="76" height="24" rx="12" fill="#F0EAE0" stroke="#C9A878"/>
      <text x="12" y="16" fill="#5A4519" font-size="12" font-weight="600">building</text>
    </g>

    <g transform="translate(404,12)">
      <text x="0" y="12" class="muted" font-size="10" font-weight="600" letter-spacing="0.5">AGENTS</text>
      <rect x="0" y="16" width="120" height="6" rx="3" fill="#E5E0D5"/>
      <rect x="0" y="16" width="27.6" height="6" rx="3" fill="#3B5B7A"/>
      <text x="126" y="22" class="txt" font-size="11" font-weight="600">23%</text>
      <text x="160" y="12" class="muted" font-size="10" font-weight="600" letter-spacing="0.5">ADVISORS</text>
      <rect x="160" y="16" width="120" height="6" rx="3" fill="#E5E0D5"/>
      <rect x="160" y="16" width="7.2" height="6" rx="3" fill="#8B6FB3"/>
      <text x="286" y="22" class="txt" font-size="11" font-weight="600">6%</text>
    </g>

    <g transform="translate(1656,16)">
      <rect width="84" height="24" rx="6" fill="#FFFFFF" stroke="#E5E0D5"/>
      <text x="10" y="16" class="txt" font-size="12" font-weight="600">PM</text>
      <text x="64" y="16" class="muted mono" font-size="11">⌘P</text>
    </g>

    <g transform="translate(1856,16)">
      <circle cx="12" cy="12" r="12" fill="#3B5B7A"/>
      <text x="12" y="16" fill="#FFFFFF" font-size="12" font-weight="700" text-anchor="middle">M</text>
    </g>
  </g>

  <!-- Sidebar rail -->
  <g id="sidebar">
    <rect x="0" y="56" width="56" height="1144" fill="#F5EFE0"/>
    <line x1="56" y1="56" x2="56" y2="1200" stroke="#E5E0D5"/>
    <g transform="translate(8,68)">
      <rect width="40" height="40" rx="8" fill="#3B5B7A"/>
      <g transform="translate(10,10)" stroke="#FFFFFF" stroke-width="2" fill="none">
        <rect x="0" y="0" width="6" height="20"/>
        <rect x="7" y="0" width="6" height="20"/>
        <rect x="14" y="0" width="6" height="20"/>
      </g>
    </g>
    <g transform="translate(18,116)" stroke="#6B6B6B" stroke-width="2" fill="none" opacity="0.7">
      <circle cx="10" cy="10" r="9"/>
      <path d="M10 3 v7 l5 3"/>
    </g>
    <g transform="translate(18,164)" stroke="#6B6B6B" stroke-width="2" fill="none" opacity="0.7">
      <rect x="0" y="1" width="20" height="18" rx="2"/>
      <line x1="4" y1="6" x2="16" y2="6"/>
      <line x1="4" y1="11" x2="16" y2="11"/>
      <line x1="4" y1="16" x2="12" y2="16"/>
    </g>
    <g transform="translate(18,212)" stroke="#6B6B6B" stroke-width="2" fill="none" opacity="0.7">
      <rect x="0" y="0" width="8" height="8"/>
      <rect x="12" y="0" width="8" height="8"/>
      <rect x="0" y="12" width="8" height="8"/>
      <rect x="12" y="12" width="8" height="8"/>
    </g>
    <g transform="translate(18,260)" stroke="#6B6B6B" stroke-width="2" fill="none" opacity="0.7">
      <path d="M10 0 L20 18 L0 18 Z"/>
      <line x1="10" y1="7" x2="10" y2="13"/>
    </g>
    <g transform="translate(18,308)" stroke="#6B6B6B" stroke-width="2" fill="none" opacity="0.7">
      <circle cx="10" cy="10" r="4"/>
      <path d="M10 0 v3 M10 17 v3 M0 10 h3 M17 10 h3"/>
    </g>
    <g transform="translate(18,356)" stroke="#6B6B6B" stroke-width="2" fill="none" opacity="0.7">
      <circle cx="10" cy="10" r="3"/>
      <circle cx="10" cy="10" r="8" stroke-dasharray="2 2"/>
    </g>
  </g>

  <!-- =============== BOARD AREA =============== -->
  <g id="board">
    <g transform="translate(72,76)">
      <text x="0" y="18" class="txt" font-size="18" font-weight="700">the Gemba</text>
      <text x="120" y="18" class="muted" font-size="13">swimlane: by parent-epic</text>
    </g>

    <!-- Column headers -->
    <g font-size="13" font-weight="700" fill="#2B2B2B">
      <g transform="translate(72,152)"><rect width="300" height="32" rx="8" fill="#F0EAE0"/><text x="14" y="21">Backlog</text><text x="280" y="21" class="muted" font-size="12" font-weight="500" text-anchor="end">3</text></g>

      <!-- Next Up column: count swaps 2 → 1 -->
      <g transform="translate(378,152)">
        <rect width="300" height="32" rx="8" fill="#F0EAE0"/>
        <text x="14" y="21">Next Up</text>
        <text id="nextup-count-old" x="280" y="21" class="muted" font-size="12" font-weight="500" text-anchor="end">2</text>
        <text id="nextup-count-new" x="280" y="21" fill="#3B5B7A" font-size="12" font-weight="700" text-anchor="end" opacity="0">1</text>
      </g>

      <!-- Staged column: header tint overlay + count swap 1/3 → 2/3 -->
      <g transform="translate(684,152)">
        <rect width="300" height="32" rx="8" fill="#EAF2FB"/>
        <rect id="staged-header-tint" width="300" height="32" rx="8" fill="#3B5B7A" opacity="0"/>
        <text x="14" y="21">Staged</text>
        <text id="staged-count-old" x="280" y="21" class="muted" font-size="12" font-weight="500" text-anchor="end">1 / 3</text>
        <text id="staged-count-new" x="280" y="21" fill="#3B5B7A" font-size="12" font-weight="700" text-anchor="end" opacity="0">2 / 3</text>
      </g>

      <g transform="translate(990,152)"><rect width="300" height="32" rx="8" fill="#EAF2FB"/><text x="14" y="21">In Progress</text><text x="280" y="21" class="muted" font-size="12" font-weight="500" text-anchor="end">1 / 3</text></g>
      <g transform="translate(1296,152)"><rect width="300" height="32" rx="8" fill="#E7F1EA"/><text x="14" y="21">Done</text><text x="280" y="21" class="muted" font-size="12" font-weight="500" text-anchor="end">1</text></g>
      <g transform="translate(1602,152)"><rect width="300" height="32" rx="8" fill="#F5EFE0"/><text x="14" y="21">Canceled</text><text x="280" y="21" class="muted" font-size="12" font-weight="500" text-anchor="end">0</text></g>
    </g>

    <!-- ==== STATIC CARDS ==== -->
    <!-- Backlog: mk-e6 (escalation), mk-e7, mk-e8 -->
    <g transform="translate(72,196)">
      <rect width="300" height="108" rx="12" class="card-shadow" transform="translate(1,2)"/>
      <rect width="300" height="108" rx="12" class="card"/>
      <rect x="0" y="0" width="4" height="108" rx="2" fill="#8B4F8F"/>
      <text x="18" y="24" class="txt mono" font-size="11" font-weight="600" fill="#6B6B6B">mk-e6 · P2</text>
      <circle cx="280" cy="22" r="7" fill="#C84747"/>
      <text x="280" y="26" fill="#FFFFFF" font-size="10" font-weight="700" text-anchor="middle">1</text>
      <text x="18" y="52" class="txt" font-size="14" font-weight="600">Pocket / Raindrop import</text>
      <text x="18" y="76" class="muted" font-size="11">0/4 ready · 4 open</text>
      <text x="18" y="96" fill="#C84747" font-size="10" font-weight="600">Pocket API v1 deprecated</text>
    </g>

    <g transform="translate(72,320)">
      <rect width="300" height="96" rx="12" class="card-shadow" transform="translate(1,2)"/>
      <rect width="300" height="96" rx="12" class="card"/>
      <rect x="0" y="0" width="4" height="96" rx="2" fill="#8B4F8F"/>
      <text x="18" y="24" class="txt mono" font-size="11" font-weight="600" fill="#6B6B6B">mk-e7 · P2</text>
      <text x="18" y="52" class="txt" font-size="14" font-weight="600">PWA / mobile polish</text>
      <text x="18" y="76" class="muted" font-size="11">0/6 ready · 6 open</text>
    </g>

    <g transform="translate(72,432)">
      <rect width="300" height="110" rx="12" class="card-shadow" transform="translate(1,2)"/>
      <rect width="300" height="110" rx="12" class="card"/>
      <rect x="0" y="0" width="4" height="110" rx="2" fill="#5F4F8F"/>
      <text x="18" y="24" class="txt mono" font-size="11" font-weight="600" fill="#6B6B6B">mk-e8 · P3</text>
      <circle cx="280" cy="22" r="7" fill="#FFF6D6" stroke="#D4A437" stroke-width="2"/>
      <text x="280" y="26" fill="#5A4519" font-size="10" font-weight="700" text-anchor="middle">!</text>
      <text x="18" y="52" class="txt" font-size="14" font-weight="600">Team sharing</text>
      <text x="18" y="76" class="muted" font-size="11">0/4 ready · 4 open</text>
      <text x="18" y="98" fill="#6B4A1A" font-size="10" font-weight="600">Blocked · Security Purview</text>
    </g>

    <!-- Next Up: ghost origin for mk-e4 + static mk-e5 -->
    <g id="ghost-origin" transform="translate(378,196)" opacity="0">
      <rect width="300" height="120" rx="12" fill="#FAFAF7" stroke="#E5E0D5" stroke-dasharray="6 4"/>
      <text x="150" y="62" class="muted" font-size="12" text-anchor="middle" font-style="italic">mk-e4 · dragging…</text>
      <text x="150" y="82" class="muted" font-size="10" text-anchor="middle">returns on cancel</text>
    </g>

    <g transform="translate(378,332)">
      <rect width="300" height="96" rx="12" class="card-shadow" transform="translate(1,2)"/>
      <rect width="300" height="96" rx="12" class="card"/>
      <rect x="0" y="0" width="4" height="96" rx="2" fill="#C87947"/>
      <text x="18" y="24" class="txt mono" font-size="11" font-weight="600" fill="#6B6B6B">mk-e5 · P1</text>
      <text x="18" y="52" class="txt" font-size="14" font-weight="600">Full-text search</text>
      <text x="18" y="76" class="muted" font-size="11">3/3 ready · eligible to stage</text>
    </g>

    <!-- Staged: mk-e3 -->
    <use href="#card-e3-staged" x="684" y="196"/>

    <!-- In Progress: mk-e2 (static simplified) -->
    <g transform="translate(990,196)">
      <rect width="300" height="160" rx="12" class="card-shadow" transform="translate(1,2)"/>
      <rect width="300" height="160" rx="12" class="card"/>
      <rect x="0" y="0" width="4" height="160" rx="2" fill="#C84747"/>
      <text x="18" y="24" class="txt mono" font-size="11" font-weight="600" fill="#6B6B6B">mk-e2 · P0</text>
      <circle cx="252" cy="20" r="10" fill="#EAF2FB" stroke="#3B82C9"/>
      <text x="252" y="24" fill="#2A4460" font-size="11" font-weight="700" text-anchor="middle">A</text>
      <circle cx="278" cy="20" r="5" fill="#D4A437"/>
      <text x="18" y="52" class="txt" font-size="14" font-weight="600">Web UI</text>
      <text x="18" y="70" class="txt" font-size="14" font-weight="600">(Next.js + Tailwind)</text>
      <text x="18" y="94" class="muted" font-size="11">2/7 done · 3 in progress · 2 ready</text>
      <text x="18" y="116" class="muted" font-size="10" letter-spacing="0.5" font-weight="600">EPIC TOKEN BUDGET</text>
      <rect x="18" y="122" width="264" height="6" rx="3" fill="#E5E0D5"/>
      <rect x="18" y="122" width="163.7" height="6" rx="3" fill="#D4A437"/>
      <text x="282" y="128" class="muted" font-size="10" text-anchor="end">62% · ~87k / 140k</text>
      <text x="18" y="148" fill="#D4A437" font-size="10" font-weight="600">mk-e2.4 stale · 14m idle</text>
    </g>

    <!-- Done: mk-e1 -->
    <g transform="translate(1296,196)">
      <rect width="300" height="130" rx="12" class="card-shadow" transform="translate(1,2)"/>
      <rect width="300" height="130" rx="12" class="card"/>
      <rect x="0" y="0" width="300" height="6" rx="0" fill="#5A9E6F"/>
      <rect x="0" y="6" width="4" height="124" rx="2" fill="#C84747"/>
      <text x="18" y="30" class="txt mono" font-size="11" font-weight="600" fill="#6B6B6B">mk-e1 · P0</text>
      <text x="18" y="58" class="txt" font-size="14" font-weight="600">Core API + persistence</text>
      <text x="18" y="82" class="muted" font-size="11">5/5 done · shipped</text>
      <text x="18" y="104" class="muted" font-size="10" letter-spacing="0.5" font-weight="600">TOKEN COST</text>
      <text x="18" y="124" fill="#5A9E6F" font-size="13" font-weight="700" class="mono">23,412</text>
    </g>

    <!-- Canceled empty -->
    <g transform="translate(1602,232)">
      <text x="150" y="40" class="muted" font-size="12" text-anchor="middle" font-style="italic">Nothing canceled yet.</text>
    </g>
  </g>

  <!-- =============== ANIMATED: dragged card =============== -->
  <g id="drag-card">
    <use href="#card-e4"/>
  </g>

  <!-- =============== ANIMATED: cursor =============== -->
  <g id="cursor">
    <path d="M0 0 L0 22 L6 17 L10 24 L13 22 L9 15 L17 15 Z" fill="#2B2B2B" stroke="#FFFFFF" stroke-width="1.2"/>
  </g>

  <!-- Caption ribbon -->
  <g transform="translate(72,1130)">
    <rect width="1720" height="40" rx="10" fill="#FFFFFF" stroke="#E5E0D5"/>
    <text x="20" y="25" class="txt" font-size="13" font-weight="600">Drag to Stage</text>
    <text x="160" y="25" class="muted" font-size="12">Pull <tspan class="mono" fill="#2A4460">mk-e4</tspan> from Next Up into Staged — header tints as a valid drop zone; column counts update on release.</text>
  </g>
</svg>
